<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Product Review</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f7fb;
      color: #222;
    }
    header {
      background: #1a73e8;
      color: white;
      padding: 20px 16px;
      text-align: center;
    }
    .container {
      max-width: 900px;
      margin: 24px auto;
      padding: 0 16px 32px;
    }
    .review-panel, .reviews {
      background: white;
      border: 1px solid #e5eaf1;
      border-radius: 16px;
      box-shadow: 0 8px 28px rgba(30, 64, 175, 0.08);
      margin-bottom: 24px;
      padding: 28px;
    }
    .review-panel h2, .reviews h2 {
      margin-top: 0;
    }
    .review-layout { display: grid; grid-template-columns: minmax(280px, 0.9fr) minmax(340px, 1.1fr); gap: 36px; align-items: center; }
    .product-details { min-width: 0; }
    .review-content { min-width: 0; }
    .review-content h2 { margin-bottom: 6px; font-size: 1.65rem; }
    .review-intro { margin: 0 0 22px; color: #64748b; line-height: 1.5; }
    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 600;
    }
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccd7e0;
      border-radius: 8px;
      box-sizing: border-box;
    }
    textarea {
      resize: vertical;
      min-height: 130px;
      font: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.13); }
    button {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #1558b0;
    }
    .review-item {
      border-top: 1px solid #e3e9f1;
      padding: 16px 0;
    }
    .review-item:first-child {
      border-top: none;
    }
    .review-meta {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      color: #555;
      font-size: 0.95rem;
    }
    .rating {
      color: #f59e0b;
      font-weight: 700;
    }
    .product-image-button { display: block; width: 100%; padding: 0; overflow: hidden; border: 0; border-radius: 12px; background: #e8eef7; box-shadow: 0 4px 14px rgba(0,0,0,0.12); }
    .product-image-button:hover { background: #e8eef7; }
    .product-image { display: block; width: 100%; height: 320px; object-fit: cover; transition: transform 0.25s ease; }
    .product-image-button:hover .product-image { transform: scale(1.03); }
    .image-hint { display: block; padding: 9px; color: #334155; background: white; font-size: 0.85rem; }
    .star-rating { display: flex; flex-direction: row-reverse; justify-content: space-between; width: 100%; max-width: 390px; gap: 12px; margin: 10px 0 8px; }
    .star-rating input { position: absolute; opacity: 0; }
    .star-rating label { margin: 0; color: #d6dde8; cursor: pointer; font-size: clamp(2.6rem, 5vw, 3.4rem); line-height: 1; filter: drop-shadow(0 2px 2px rgba(15,23,42,0.08)); transition: color 0.15s, transform 0.15s; }
    .star-rating label:hover, .star-rating label:hover ~ label, .star-rating input:checked ~ label { color: #f59e0b; }
    .star-rating label:hover { transform: scale(1.12); }
    .star-rating input:focus-visible + label { outline: 2px solid #1a73e8; outline-offset: 3px; }
    .rating-message { min-height: 20px; margin: 0; color: #64748b; font-size: 0.9rem; }
    .submit-review { width: 100%; margin-top: 8px; font-weight: 700; transition: background 0.2s, transform 0.2s; }
    .submit-review:hover { transform: translateY(-1px); }
    .modal { display: none; position: fixed; z-index: 10; inset: 0; padding: 24px; background: rgba(15, 23, 42, 0.78); align-items: center; justify-content: center; }
    .modal.open { display: flex; }
    .modal-content { position: relative; width: min(760px, 100%); padding: 18px; border-radius: 14px; background: white; text-align: center; }
    .modal-content img { display: block; width: 100%; max-height: 70vh; object-fit: contain; border-radius: 9px; }
    .modal-close { position: absolute; top: -14px; right: -14px; width: 40px; height: 40px; padding: 0; border-radius: 50%; font-size: 1.5rem; }
    .empty-state {
      color: #555;
      font-style: italic;
    }
    @media (max-width: 760px) {
      .review-layout { grid-template-columns: 1fr; gap: 26px; }
      .product-image { height: 280px; }
      .star-rating { max-width: 100%; }
    }
    @media (max-width: 480px) {
      .review-panel, .reviews { padding: 20px; }
      .product-image { height: 220px; }
      .star-rating { gap: 6px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Change the name of this later</h1>
    <p> What do you think of this product?</p>
  </header>
  <div class="container">
    <section class="review-panel">
      <div class="review-layout">
        <div class="product-details">
          <button type="button" class="product-image-button" id="openImageModal" aria-label="Open a larger product image">
            <!-- Replace the src below with the product image supplied by the main product page. -->
            <img class="product-image" id="productImage" src="https://placehold.co/700x450/e8eef7/1a73e8?text=Product+Image" alt="Product image">
            <span class="image-hint">Click image to enlarge</span>
          </button>
        </div>
        <div class="review-content">
          <h2> Drop Some Stars! </h2>
          <p class="review-intro">How was your experience with this product?</p>
          <form id="reviewForm">
            <label id="ratingLabel">Your rating</label>
            <div class="star-rating" role="radiogroup" aria-labelledby="ratingLabel">
              <input type="radio" id="star5" name="rating" value="5" required><label for="star5" title="Excellent">&#9733;</label>
              <input type="radio" id="star4" name="rating" value="4"><label for="star4" title="Very good">&#9733;</label>
              <input type="radio" id="star3" name="rating" value="3"><label for="star3" title="Good">&#9733;</label>
              <input type="radio" id="star2" name="rating" value="2"><label for="star2" title="Fair">&#9733;</label>
              <input type="radio" id="star1" name="rating" value="1"><label for="star1" title="Poor">&#9733;</label>
            </div>
            <p class="rating-message" id="ratingMessage"> 5 stars looks nice </p>

            <label for="review">Your Opinion Matters! </label>
            <textarea id="review" name="review" placeholder="Tell other customers what you liked or disliked..." required></textarea>

            <button type="submit" class="submit-review">Submit Review</button>
          </form>
        </div>
      </div>
    </section>

    <section class="reviews">
      <h2>Customer Reviews</h2>
      <div id="reviewList" class="empty-state">Be our first reviewer! It's really empty out here, Sahara Desert....</div>
    </section>
  </div>

  <div class="modal" id="imageModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <button type="button" class="modal-close" id="closeImageModal" aria-label="Close image popup">&times;</button>
      <h2 id="modalTitle">Product Image</h2>
      <img id="modalImage" src="https://placehold.co/700x450/e8eef7/1a73e8?text=Product+Image" alt="Large product image">
    </div>
  </div>

  <script>
    const form = document.getElementById('reviewForm');
    const reviewList = document.getElementById('reviewList');
    const ratingInputs = document.querySelectorAll('input[name="rating"]');
    const ratingMessage = document.getElementById('ratingMessage');
    const productImage = document.getElementById('productImage');
    const modalImage = document.getElementById('modalImage');
    const imageModal = document.getElementById('imageModal');
    const openImageModal = document.getElementById('openImageModal');
    const closeImageModal = document.getElementById('closeImageModal');

    ratingInputs.forEach(input => input.addEventListener('change', () => {
      ratingMessage.textContent = `${input.value} out of 5 stars selected`;
    }));

    function showModal() {
      modalImage.src = productImage.src;
      imageModal.classList.add('open');
      closeImageModal.focus();
    }
    function hideModal() { imageModal.classList.remove('open'); openImageModal.focus(); }
    openImageModal.addEventListener('click', showModal);
    closeImageModal.addEventListener('click', hideModal);
    imageModal.addEventListener('click', event => { if (event.target === imageModal) hideModal(); });
    document.addEventListener('keydown', event => {
      if (event.key === 'Escape' && imageModal.classList.contains('open')) hideModal();
    });

    form.addEventListener('submit', function(event) {
      event.preventDefault();

      const selectedRating = document.querySelector('input[name="rating"]:checked');
      const rating = selectedRating ? selectedRating.value : '';
      const reviewText = document.getElementById('review').value.trim();

      if (!rating || !reviewText) {
        return;
      }

      const reviewItem = document.createElement('div');
      reviewItem.className = 'review-item';
      const meta = document.createElement('div');
      meta.className = 'review-meta';
      const author = document.createElement('strong');
      author.textContent = 'Customer';
      const ratingDisplay = document.createElement('span');
      ratingDisplay.className = 'rating';
      ratingDisplay.textContent = `${'\u2605'.repeat(Number(rating))}${'\u2606'.repeat(5 - Number(rating))} ${rating}/5`;
      const reviewBody = document.createElement('p');
      reviewBody.textContent = reviewText;
      reviewBody.style.whiteSpace = 'pre-wrap';
      meta.append(author, ratingDisplay);
      reviewItem.append(meta, reviewBody);

      if (reviewList.classList.contains('empty-state')) {
        reviewList.classList.remove('empty-state');
        reviewList.innerHTML = '';
      }

      reviewList.prepend(reviewItem);
      form.reset();
      ratingMessage.textContent = 'Select a star rating';
    });
  </script>
</body>
</html>
